<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEONWORLD: The Underground — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Inter',sans-serif;color:#e0e0e0;-webkit-font-smoothing:antialiased}

/* ===== CUTSCENE VIDEO ===== */
#cutscene-overlay{position:fixed;inset:0;z-index:200;background:#000;display:none;align-items:center;justify-content:center}
#cutscene-overlay.active{display:flex}
#cutscene-overlay video{width:100%;height:100%;object-fit:contain}
#cutscene-skip{position:absolute;bottom:40px;right:40px;padding:10px 24px;font-family:'Inter',sans-serif;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.3s;border-radius:2px}
#cutscene-skip:hover{color:#fff;border-color:rgba(0,240,255,0.5);background:rgba(0,240,255,0.1)}

/* ===== GAME CONTAINER ===== */
#game{position:fixed;inset:0;overflow:hidden}

/* ===== BACKGROUND ===== */
#bg-layer{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 0.8s ease;z-index:1}
#bg-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,15,0.1) 0%,rgba(10,10,15,0.05) 40%,rgba(10,10,15,0.4) 80%,rgba(10,10,15,0.85) 100%);z-index:2}

/* Ken Burns */
@keyframes ken-burns{0%{transform:scale(1) translate(0,0)}50%{transform:scale(1.05) translate(-1%,-0.5%)}100%{transform:scale(1) translate(0,0)}}
#bg-layer.animate{animation:ken-burns 25s ease-in-out infinite}

/* ===== CHARACTER SPRITE ===== */
#sprite-layer{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:85%;z-index:5;opacity:0;transition:opacity 0.6s ease,transform 0.6s ease;pointer-events:none;filter:drop-shadow(0 0 30px rgba(0,0,0,0.5))}
#sprite-layer.visible{opacity:1;transform:translateX(-50%) translateY(0)}
#sprite-layer.entering{opacity:0;transform:translateX(-40%) translateY(10px)}

/* ===== CG OVERLAY ===== */
#cg-layer{position:absolute;inset:0;background-size:cover;background-position:center;z-index:10;opacity:0;transition:opacity 1s ease;pointer-events:none}
#cg-layer.active{opacity:1;animation:ken-burns 30s ease-in-out infinite}

/* ===== SCANLINES & VIGNETTE ===== */
#scanlines{position:absolute;inset:0;z-index:15;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);opacity:0.4}
#vignette{position:absolute;inset:0;z-index:16;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)}

/* ===== SCENE TRANSITION ===== */
#transition-flash{position:absolute;inset:0;z-index:100;pointer-events:none;opacity:0}
@keyframes neon-flash{0%{opacity:0;background:radial-gradient(circle,rgba(0,240,255,0.3),transparent)}30%{opacity:1;background:radial-gradient(circle,rgba(255,0,255,0.4),transparent)}60%{opacity:0.8;background:#000}100%{opacity:0;background:transparent}}

/* ===== DIALOGUE BOX ===== */
#dialogue-box{position:absolute;bottom:0;left:0;right:0;z-index:50;padding:20px 24px 28px;background:linear-gradient(135deg,rgba(10,5,20,0.95),rgba(20,10,40,0.92));border-top:2px solid;border-image:linear-gradient(90deg,#00f0ff,#ff00ff,#00f0ff) 1;backdrop-filter:blur(12px);min-height:140px;cursor:pointer;opacity:0;transition:opacity 0.4s ease;display:flex;flex-direction:column}
#dialogue-box.visible{opacity:1}

/* Animated top bar */
#dialogue-box::before{content:'';position:absolute;top:-3px;left:0;right:0;height:3px;background:linear-gradient(90deg,#00f0ff,#ff00ff,#8b5cf6,#00f0ff);background-size:300% 100%;animation:neon-shift 4s linear infinite}
@keyframes neon-shift{0%{background-position:0% 0%}100%{background-position:300% 0%}}

#speaker-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:500;letter-spacing:0.05em;margin-bottom:8px;text-transform:uppercase}
#speaker-name.meera{color:#00f0ff;text-shadow:0 0 10px rgba(0,240,255,0.4)}
#speaker-name.player{color:#ff00ff;text-shadow:0 0 10px rgba(255,0,255,0.4)}
#speaker-name.narrator{color:#8b5cf6;text-shadow:0 0 10px rgba(139,92,246,0.3);font-style:italic;text-transform:none;font-size:0.9rem}

#dialogue-text{font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:300;line-height:1.7;color:rgba(230,230,240,0.95);flex:1}

#advance-indicator{position:absolute;bottom:10px;right:20px;font-size:0.7rem;color:rgba(0,240,255,0.4);letter-spacing:0.1em;animation:pulse-indicator 2s ease-in-out infinite}
@keyframes pulse-indicator{0%,100%{opacity:0.3}50%{opacity:0.8}}

/* ===== CHOICES ===== */
#choices-container{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;display:none;flex-direction:column;gap:12px;width:90%;max-width:700px}
#choices-container.active{display:flex}

.choice-btn{padding:16px 24px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:300;color:rgba(230,230,240,0.9);background:linear-gradient(135deg,rgba(10,5,20,0.9),rgba(20,10,40,0.85));border:1px solid rgba(0,240,255,0.2);cursor:pointer;transition:all 0.3s ease;text-align:left;line-height:1.5;letter-spacing:0.01em;backdrop-filter:blur(8px)}
.choice-btn:hover{border-color:rgba(0,240,255,0.6);background:linear-gradient(135deg,rgba(0,240,255,0.1),rgba(255,0,255,0.05));box-shadow:0 0 20px rgba(0,240,255,0.15);transform:translateY(-1px);color:#fff}

/* ===== CHAPTER TITLE CARD ===== */
#chapter-card{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.95);flex-direction:column}
#chapter-card.active{display:flex}
#chapter-card h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:#e0e0e0;letter-spacing:0.05em;opacity:0;animation:fade-up 1s 0.3s ease forwards}
#chapter-card .chapter-sub{font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,240,255,0.6);margin-top:12px;opacity:0;animation:fade-up 1s 0.6s ease forwards}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== VARIABLE TRACKER ===== */
#var-tracker{position:absolute;top:10px;right:10px;z-index:55;background:rgba(10,5,20,0.8);border:1px solid rgba(0,240,255,0.15);padding:10px 14px;font-size:0.7rem;min-width:140px;backdrop-filter:blur(8px);transition:opacity 0.3s;border-radius:2px}
#var-tracker.hidden{opacity:0;pointer-events:none}
.var-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0}
.var-label{color:rgba(200,200,210,0.7);letter-spacing:0.05em;text-transform:uppercase;font-size:0.65rem}
.var-bar{width:60px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-left:8px}
.var-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.var-fill.intrigue{background:#6366f1}
.var-fill.trust{background:#00f0ff}
.var-fill.desire{background:#ff00ff}
.var-fill.boldness{background:#f59e0b}

/* ===== DEMO OVER OVERLAY ===== */
#demo-over{position:absolute;inset:0;z-index:150;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.95);text-align:center;padding:40px}
#demo-over.active{display:flex}
#demo-over h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:400;color:#e0e0e0;letter-spacing:0.05em;margin-bottom:16px;text-shadow:0 0 40px rgba(0,240,255,0.2);opacity:0;animation:fade-up 1.2s 0.3s ease forwards}
#demo-over .tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:rgba(0,240,255,0.5);margin-bottom:40px;opacity:0;animation:fade-up 1.2s 0.6s ease forwards}
#demo-over .neon-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,#00f0ff,#ff00ff,transparent);margin:0 auto 40px;opacity:0;animation:fade-up 1s 0.8s ease forwards}
.demo-cta{display:inline-block;padding:16px 40px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;color:#0a0a0f;background:linear-gradient(135deg,#00f0ff,#00c8ff);border:none;cursor:pointer;transition:all 0.4s ease;margin-bottom:16px;opacity:0;animation:fade-up 1s 1s ease forwards}
.demo-cta:hover{box-shadow:0 0 30px rgba(0,240,255,0.4);transform:translateY(-2px)}
.demo-return{display:inline-block;font-family:'Inter',sans-serif;font-size:0.8rem;color:rgba(200,200,210,0.5);text-decoration:none;letter-spacing:0.08em;margin-top:8px;transition:color 0.3s;opacity:0;animation:fade-up 1s 1.2s ease forwards}
.demo-return:hover{color:#00f0ff}
.demo-stats{margin-top:30px;font-size:0.75rem;color:rgba(200,200,210,0.3);opacity:0;animation:fade-up 1s 1.4s ease forwards}

/* ===== LOADING ===== */
#loading-screen{position:fixed;inset:0;z-index:300;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.8s ease}
#loading-screen.done{opacity:0;pointer-events:none}
#loading-screen h1{font-family:'Playfair Display',serif;font-size:2rem;color:#e0e0e0;letter-spacing:0.1em;margin-bottom:20px}
#loading-bar{width:200px;height:2px;background:rgba(255,255,255,0.1);border-radius:1px;overflow:hidden}
#loading-fill{width:0%;height:100%;background:linear-gradient(90deg,#00f0ff,#ff00ff);transition:width 0.3s ease}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  #dialogue-box{padding:16px 18px 24px;min-height:120px}
  #dialogue-text{font-size:0.88rem}
  #sprite-layer{height:70%}
  .choice-btn{padding:14px 18px;font-size:0.85rem}
  #var-tracker{top:6px;right:6px;padding:6px 10px;font-size:0.6rem}
}

<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <h1>NEONWORLD</h1>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<!-- Cutscene Video Overlay -->
<div id="cutscene-overlay">
  <video id="cutscene-video" playsinline></video>

</div>

<!-- Game Container -->
<div id="game">
  <div id="bg-layer" class="animate"></div>
  <img id="sprite-layer" src="" alt="">
  <div id="cg-layer"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="transition-flash"></div>

  <div id="var-tracker">
    <div class="var-row"><span class="var-label">Intrigue</span><div class="var-bar"><div class="var-fill intrigue" id="bar-intrigue"></div></div></div>
    <div class="var-row"><span class="var-label">Trust</span><div class="var-bar"><div class="var-fill trust" id="bar-trust"></div></div></div>
    <div class="var-row"><span class="var-label">Desire</span><div class="var-bar"><div class="var-fill desire" id="bar-desire"></div></div></div>
    <div class="var-row"><span class="var-label">Boldness</span><div class="var-bar"><div class="var-fill boldness" id="bar-boldness"></div></div></div>
  </div>

  <div id="dialogue-box">
    <div id="speaker-name"></div>
    <div id="dialogue-text"></div>
    <div id="advance-indicator">CLICK TO CONTINUE</div>
  </div>

  <div id="choices-container"></div>

  <div id="demo-over">
    <h1>DEMO OVER</h1>
    <div class="tagline">The underground has more to reveal...</div>
    <div class="neon-line"></div>

    <a href="index.html" class="demo-return">Return to VERALABS</a>
    <div class="demo-stats" id="demo-stats"></div>
  </div>
</div>

<script>
// ========================================================================
// NEONWORLD DEMO — VANILLA JS VN ENGINE
// ========================================================================

const ASSET_BASE = 'assets/vn';

// Asset ID to filename mappings
const ASSET_MAP = {
  'bg_neon_entrance':'backgrounds/neon_entrance_corridor.jpg',
  'bg_vip_bar':'backgrounds/vip_bar_counter.jpg',
  'bg_vip_ballroom':'backgrounds/vip_ballroom.jpg',
  'bg_neon_pond':'backgrounds/neon_pond.jpg',
  'bg_champagne_lounge':'backgrounds/champagne_lounge.jpg',
  'bg_dance_floor':'backgrounds/dance_floor_arena.jpg',
  'bg_underground_loft':'backgrounds/underground_loft.jpg',
  'bg_mirror_labyrinth':'backgrounds/mirror_labyrinth.jpg',
  'meera_welcoming':'sprites/meera_welcoming.png',
  'meera_confident':'sprites/meera_confident.png',
  'meera_mysterious':'sprites/meera_mysterious.png',
  'meera_playful':'sprites/meera_playful.png',
  'meera_alluring':'sprites/meera_alluring.png',
  'meera_intimate':'sprites/meera_intimate.png',
  'meera_vulnerable':'sprites/meera_vulnerable.png',
  'meera_bold':'sprites/meera_bold.png',
  'meera_aquatic':'sprites/meera_aquatic.png',
  'meera_passionate':'sprites/meera_passionate.png',
  'meera_contemplative':'sprites/meera_contemplative.png',
  'meera_teasing':'sprites/meera_teasing.png',
  'meera_trusting':'sprites/meera_trusting.png',
  'meera_ethereal':'sprites/meera_ethereal.png',
  'cg_descent_corridor':'cgs/cg_descent_corridor.jpg',
  'cg_first_meeting':'cgs/cg_first_meeting.jpg',
  'cg_ballroom_entrance':'cgs/cg_ballroom_entrance.jpg',
  'cg_neon_pond_wade':'cgs/cg_neon_pond_wade.jpg',
  'cg_dance_floor_energy':'cgs/cg_dance_floor_energy.jpg',
  'cg_champagne_toast':'cgs/cg_champagne_toast.jpg',
  'cg_loft_morning':'cgs/cg_loft_morning.jpg',
  'cg_fever_dance':'cgs/cg_fever_dance.jpg',
  'cg_garden_wonder':'cgs/cg_garden_wonder.jpg',
  'cg_mirror_reflection':'cgs/cg_mirror_reflection.jpg'
};

function assetUrl(id) {
  return ASSET_MAP[id] ? ASSET_BASE + '/' + ASSET_MAP[id] : '';
}

// Cutscene videos that play before certain scenes
const CUTSCENE_MAP = {
  'scene_1_descent': 'assets/vn/videos/intro_01_logo_reveal.mp4',
  'scene_2_bar': 'assets/vn/videos/cutscene_bar_meeting.mp4',
  'scene_6_morning_after': 'assets/vn/videos/cutscene_ch1_to_ch2.mp4'
};

// Scenes that trigger DEMO OVER when their choices would lead deeper
const DEMO_END_SCENES = ['scene_7_mirror_room', 'scene_7b_fever'];

// ========================================================================
// SCENE DATA (extracted from neonworldScenes.ts)
// ========================================================================
const SCENES = {
  scene_1_descent: {
    id:'scene_1_descent', title:'The Descent', chapter:'Chapter 1: The Invitation',
    sceneFlow:[
      {beat:'TheInvitation',
       dialogue:[
         {speaker:'narrator',line:'The card arrived three days ago. No return address. No name. Just a black rectangle with a symbol that seemed to shift when you weren\'t looking directly at it \u2014 and an address written in ink that glowed faintly in the dark.'},
         {speaker:'narrator',line:'Now you stand in a freight elevator descending into the earth. The walls vibrate with a low frequency you feel in your sternum more than hear with your ears. Somewhere below, a world is waiting.'},
         {speaker:'player',line:'How far down does this go?'},
         {speaker:'narrator',line:'The elevator answers with a gentle chime. The doors part. Before you stretches a corridor that shouldn\'t exist \u2014 a hundred meters of neon-soaked passage carved beneath the city streets.'}
       ],background:'bg_neon_entrance'},
      {beat:'TheCorridorWalk',
       dialogue:[
         {speaker:'narrator',line:'Magenta light bleeds into cyan along the corridor walls. Fog machines hidden in the baseboard breathe mist across the polished concrete floor, and your reflection walks beneath you like a ghost. The bass grows heavier \u2014 not music yet, but a heartbeat. The heartbeat of something vast and alive.'},
         {speaker:'narrator',line:'Halfway down, you notice the walls are lined with one-way mirrors. You catch fractured glimpses of movement behind them \u2014 silhouettes, laughter, the clink of crystal. Entire rooms hide behind the glass, watching you approach without revealing themselves.'},
         {speaker:'player',line:'This is either the most elaborate party invitation I\'ve ever received, or I\'m walking into something I can\'t walk out of.'},
         {speaker:'narrator',line:'At the corridor\'s end, the passage opens. The ceiling lifts away, the walls dissolve, and the underground world reveals itself in a single breathtaking panorama.'}
       ],background:'bg_neon_entrance',cg:'cg_descent_corridor'},
      {beat:'TheReveal',
       dialogue:[
         {speaker:'narrator',line:'NEONWORLD. There is no other word for it. A subterranean cathedral of pleasure and light \u2014 three stories deep, carved from raw stone and lined with obsidian tile that reflects every neon frequency into infinity. Bars glow like aquariums. Balconies wrap around a central atrium where holographic projections swim through the air like bioluminescent jellyfish.'},
         {speaker:'narrator',line:'And there, at the base of a spiral staircase wrapped in violet LEDs, stands a silhouette. She hasn\'t moved. She doesn\'t need to. The entire room seems to orbit her \u2014 light bending, sound softening, gravity shifting. She is waiting for you.'},
         {speaker:'narrator',line:'She lifts a glass of something that glows faintly amber and tilts her head, studying you across the distance with dark eyes that miss nothing.'}
       ],background:'bg_neon_entrance',cg:'cg_descent_corridor'}
    ],
    choices:[
      {id:'choice_1_confident',text:'Step forward with confidence \u2014 walk straight toward her like you belong here.',effects:{Boldness:10,Intrigue:5},nextScene:'scene_2_bar'},
      {id:'choice_1_cautious',text:'Take a cautious look around first \u2014 absorb the world before approaching.',effects:{Trust:5},nextScene:'scene_2_bar'}
    ]
  },

  scene_2_bar: {
    id:'scene_2_bar', title:'The Bar', chapter:'Chapter 1: The Invitation',
    sceneFlow:[
      {beat:'FirstSight',
       dialogue:[
         {speaker:'narrator',line:'She turns. The neon catches her jawline, the curve of her collarbone, the deliberate architecture of a woman who knows exactly what every angle of her face does to a room. Her dress is liquid black with a slit that reveals one leg from ankle to mid-thigh, and her eyes hold the particular confidence of someone who has never once needed to raise her voice to command attention.'},
         {speaker:'meera',line:'You found us.',emotion:'welcoming'},
         {speaker:'narrator',line:'Her voice is low, warm, unhurried. She says it like a fact \u2014 not a greeting. As if your arrival was always a matter of when, not if.'},
         {speaker:'meera',line:'Most people who receive an invitation stand in that corridor for ten minutes before they work up the nerve to walk the whole way. You didn\'t hesitate.',emotion:'confident'}
       ],background:'bg_vip_bar',character:'meera_welcoming',cg:'cg_first_meeting'},
      {beat:'TheExchange',
       dialogue:[
         {speaker:'player',line:'Should I have?'},
         {speaker:'meera',line:'Hesitated? No. The hesitators never make it past the second room. NEONWORLD isn\'t for the cautious \u2014 it\'s for people who want to feel something they can\'t feel anywhere else.',emotion:'confident'},
         {speaker:'narrator',line:'She slides a glass across the marble. Something dark amber with a single sphere of ice, lit from beneath by the counter glow. You didn\'t order it. She knew what you\'d want before you did.'},
         {speaker:'meera',line:'Drink. You\'ll need it where we\'re going.',emotion:'confident'},
         {speaker:'narrator',line:'She watches you over the rim of her own glass. There\'s a game behind those dark eyes \u2014 a test you\'re already taking without knowing the rules.'}
       ],background:'bg_vip_bar',character:'meera_confident'},
      {beat:'TheChemistry',
       dialogue:[
         {speaker:'meera',line:'I should tell you \u2014 everyone who comes here thinks they understand what this place is. A club. A lounge. An experience. They\'re wrong. NEONWORLD is a question, and you don\'t find the answer by staying at the bar.',emotion:'mysterious'},
         {speaker:'player',line:'And who are you in all of this?'},
         {speaker:'meera',line:'I\'m the one who decides how deep you go.',emotion:'confident'},
         {speaker:'narrator',line:'She sets her glass down with a quiet click. Her fingers are elegant, precise, adorned with a single ring that pulses with faint light \u2014 the same symbol from the invitation card.'}
       ],background:'bg_vip_bar',character:'meera_confident'}
    ],
    choices:[
      {id:'choice_2_compliment',text:'Compliment her and ask for her name \u2014 let her know she has your full attention.',effects:{Desire:10,Intrigue:5},nextScene:'scene_3_tour'},
      {id:'choice_2_cool',text:'Order a drink first, play it cool \u2014 match her energy, don\'t give ground.',effects:{Intrigue:10,Trust:5,Boldness:5},nextScene:'scene_3_tour'},
      {id:'choice_2_direct',text:'Ask directly: "What is this place?" \u2014 cut through the mystery.',effects:{Trust:10,Boldness:5},nextScene:'scene_3_tour'}
    ]
  },

  scene_3_tour: {
    id:'scene_3_tour', title:'The Tour', chapter:'Chapter 1: The Invitation',
    sceneFlow:[
      {beat:'TheBallroom',
       dialogue:[
         {speaker:'narrator',line:'Meera steps away from the bar and the crowd parts for her without being asked. She moves through NEONWORLD like water through a river \u2014 naturally, inevitably. You follow, drawn by something you can\'t name.'},

// ========================================================================
// ASSET PRELOADING
// ========================================================================
function preloadAssets() {
  const allUrls = Object.values(ASSET_MAP).map(f => ASSET_BASE + '/' + f);
  let loaded = 0;
  const total = allUrls.length;

  return new Promise(resolve => {
    if (total === 0) { resolve(); return; }
    allUrls.forEach(url => {
      if (url.endsWith('.png') || url.endsWith('.jpg')) {
        const img = new Image();
        img.onload = img.onerror = () => { loaded++; loadingFill.style.width = (loaded/total*100)+'%'; if(loaded>=total) resolve(); };
        img.src = url;
      } else {
        loaded++; loadingFill.style.width = (loaded/total*100)+'%'; if(loaded>=total) resolve();
      }
    });
  });
}

// ========================================================================
// CUTSCENE VIDEO PLAYER
// ========================================================================
function playCutscene(videoUrl) {
  return new Promise(resolve => {
    cutsceneVideo.src = videoUrl;
    cutsceneOverlay.classList.add('active');
    cutsceneVideo.play().catch(() => { cutsceneOverlay.classList.remove('active'); resolve(); });
    const finish = () => {
      cutsceneOverlay.classList.remove('active');
      cutsceneVideo.pause();
      cutsceneVideo.src = '';
      resolve();
    };
    cutsceneVideo.onended = finish;
    cutsceneSkip.onclick = finish;
  });
}

// ========================================================================
// SCENE TRANSITION
// ========================================================================
function playTransition() {
  return new Promise(resolve => {
    transFlash.style.animation = 'neon-flash 0.8s ease-out forwards';
    setTimeout(() => { transFlash.style.animation = ''; resolve(); }, 800);
  });
}

function showChapterCard(title, sub) {
  return new Promise(resolve => {
    chapterCard.querySelector('h2').textContent = title;
    chapterCard.querySelector('.chapter-sub').textContent = sub;
    chapterCard.classList.add('active');
    setTimeout(() => { chapterCard.classList.remove('active'); resolve(); }, 2500);
  });
}

// ========================================================================
// DISPLAY FUNCTIONS
// ========================================================================
let currentBg = '';
let currentSprite = '';
let currentCg = '';

function setBg(bgId) {
  if (!bgId || bgId === currentBg) return;
  currentBg = bgId;
  const url = assetUrl(bgId);
  if (url) bgLayer.style.backgroundImage = 'url(' + url + ')';
}

function setSprite(charId) {
  if (charId === currentSprite) return;
  currentSprite = charId;
  if (!charId) {
    spriteLayer.classList.remove('visible');
    return;
  }
  const url = assetUrl(charId);
  if (!url) { spriteLayer.classList.remove('visible'); return; }
  spriteLayer.classList.remove('visible');
  spriteLayer.classList.add('entering');
  spriteLayer.src = url;
  spriteLayer.onload = () => {
    setTimeout(() => {
      spriteLayer.classList.remove('entering');
      spriteLayer.classList.add('visible');
    }, 50);
  };
  spriteLayer.onerror = () => spriteLayer.classList.remove('entering');
}

function setCg(cgId) {
  if (cgId === currentCg) return;
  currentCg = cgId;
  if (!cgId) {
    cgLayer.classList.remove('active');
    return;
  }
  const url = assetUrl(cgId);
  if (url) {
    cgLayer.style.backgroundImage = 'url(' + url + ')';
    cgLayer.classList.add('active');
  }
}

function updateVarBars() {
  $('bar-intrigue').style.width = state.vars.Intrigue + '%';
  $('bar-trust').style.width = state.vars.Trust + '%';
  $('bar-desire').style.width = state.vars.Desire + '%';
  $('bar-boldness').style.width = state.vars.Boldness + '%';
}

function applyEffects(effects) {
  for (const [k, v] of Object.entries(effects)) {
    if (['Intrigue','Trust','Desire','Boldness'].includes(k)) {
      state.vars[k] = Math.max(0, Math.min(100, (state.vars[k]||0) + v));
    } else if (k === 'AccessLevel') {
      state.vars.AccessLevel = Math.max(1, Math.min(5, v));
    } else if (k.startsWith('Flag_')) {
      state.flags[k] = v;
    }
  }
  updateVarBars();
}

    let i = 0;
    state.typeTimer = setInterval(() => {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
      } else {
        clearInterval(state.typeTimer);
        state.typeTimer = null;
        state.isTyping = false;
        resolve();
      }
    }, TYPE_SPEED);
  });
}

function skipType(text, el) {
  if (state.typeTimer) {
    clearInterval(state.typeTimer);
    state.typeTimer = null;
  }
  el.textContent = text;
  state.isTyping = false;
}

// ========================================================================
// RENDER CURRENT STATE
// ========================================================================
function getCurrentLine() {
  const scene = SCENES[state.sceneId];
  if (!scene) return null;
  const beat = scene.sceneFlow[state.beatIndex];
  if (!beat || !beat.dialogue) return null;
  return beat.dialogue[state.dialogueIndex];
}

function getCurrentBeat() {
  const scene = SCENES[state.sceneId];
  if (!scene) return null;
  return scene.sceneFlow[state.beatIndex];
}

async function renderLine() {
  const line = getCurrentLine();
  const beat = getCurrentBeat();
  if (!line) return;

  // Update background/sprite/cg from beat
  if (beat) {
    if (beat.background) setBg(beat.background);
    if (beat.character) setSprite(beat.character);
    else if (state.beatIndex === 0 && !beat.character) setSprite(null);
    if (beat.cg) setCg(beat.cg);
    else setCg(null);
  }

  // Speaker name
  speakerName.textContent = line.speaker === 'narrator' ? '' : (line.speaker === 'meera' ? 'Meera' : 'You');
  speakerName.className = line.speaker;

  // Show dialogue box
  dialogueBox.classList.add('visible');

  // Typewriter
  await typeText(line.line, dialogueText);
}

// ========================================================================
// ADVANCE LOGIC
// ========================================================================
function advance() {
  if (state.showingChoices) return;

  const line = getCurrentLine();
  if (state.isTyping && line) {
    skipType(line.line, dialogueText);
    return;
  }

  const scene = SCENES[state.sceneId];
  if (!scene) return;
  const beat = scene.sceneFlow[state.beatIndex];
  if (!beat || !beat.dialogue) return;

  // Next dialogue line in current beat
  if (state.dialogueIndex < beat.dialogue.length - 1) {
    state.dialogueIndex++;
    renderLine();
    return;
  }

  // Next beat
  if (state.beatIndex < scene.sceneFlow.length - 1) {
    state.beatIndex++;
    state.dialogueIndex = 0;
    renderLine();
    return;
  }

  // End of scene flow — show choices or demo end
  if (DEMO_END_SCENES.includes(state.sceneId)) {
    showDemoOver();
    return;
  }

  if (scene.choices && scene.choices.length > 0) {
    showChoices(scene.choices);
  }
}

// ========================================================================
// CHOICES
// ========================================================================
function showChoices(choices) {
  state.showingChoices = true;
  dialogueBox.classList.remove('visible');
  choicesContainer.innerHTML = '';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.text;
    btn.onclick = () => selectChoice(choice);
    choicesContainer.appendChild(btn);
  });

  choicesContainer.classList.add('active');
}

async function selectChoice(choice) {
  choicesContainer.classList.remove('active');
  state.showingChoices = false;
  state.choicesMade++;

  // Apply effects
  if (choice.effects) applyEffects(choice.effects);

  const nextSceneId = choice.nextScene;
  if (!nextSceneId || !SCENES[nextSceneId]) {
    showDemoOver();
    return;
  }

  await changeScene(nextSceneId);
}

// ========================================================================
// SCENE CHANGE
// ========================================================================
async function changeScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) { showDemoOver(); return; }

  // Check for chapter transition
  const prevScene = SCENES[state.sceneId];
  const prevChapter = prevScene ? prevScene.chapter : '';
  const newChapter = scene.chapter || '';

  // Play transition
  await playTransition();

  // Play cutscene if exists and not already played
  if (CUTSCENE_MAP[sceneId] && !state.playedCutscenes.has(sceneId)) {
    state.playedCutscenes.add(sceneId);
    await playCutscene(CUTSCENE_MAP[sceneId]);
  }

  // Show chapter card if chapter changed
  if (newChapter && newChapter !== prevChapter) {
    const parts = newChapter.split(':');
    await showChapterCard(parts[0].trim(), parts[1] ? parts[1].trim() : '');
  }

  // Update state
  state.sceneId = sceneId;
  state.beatIndex = 0;
  state.dialogueIndex = 0;
  if (!state.scenesVisited.includes(sceneId)) state.scenesVisited.push(sceneId);

  // Clear CG
  setCg(null);

  // Render first line
  renderLine();
}

// ========================================================================
// DEMO OVER
// ========================================================================
function showDemoOver() {
  dialogueBox.classList.remove('visible');
  choicesContainer.classList.remove('active');

  const elapsed = Date.now() - state.startTime;
  const mins = Math.floor(elapsed / 60000);
  const secs = Math.floor((elapsed % 60000) / 1000);
  $('demo-stats').textContent = mins + 'm ' + secs + 's \u2022 ' + state.choicesMade + ' choices \u2022 ' + state.scenesVisited.length + ' scenes';

  demoOver.classList.add('active');
}

// ========================================================================
// INPUT HANDLING
// ========================================================================
dialogueBox.addEventListener('click', e => { e.stopPropagation(); advance(); });
document.addEventListener('click', e => {
  if (!state.showingChoices && !demoOver.classList.contains('active') && !cutsceneOverlay.classList.contains('active') && !chapterCard.classList.contains('active')) {
    advance();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); advance(); }
  if (e.key === 'v' || e.key === 'V') { varTracker.classList.toggle('hidden'); }
});

// ========================================================================
// INIT
// ========================================================================
async function init() {
  updateVarBars();
  await preloadAssets();

  // Fade loading screen
  loadingScreen.classList.add('done');
  setTimeout(() => loadingScreen.style.display = 'none', 800);

  // Play intro cutscene
  if (CUTSCENE_MAP['scene_1_descent']) {
    state.playedCutscenes.add('scene_1_descent');
    await playCutscene(CUTSCENE_MAP['scene_1_descent']);
  }

  // Show chapter card
  await showChapterCard('Chapter 1', 'The Invitation');

  // Render first line
  renderLine();
}

init();
</script>
</body>
</html>
